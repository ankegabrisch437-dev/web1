<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【新盘首发】慕尼黑现代都市公寓 | Harvest Residences</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">

    <nav class="absolute w-full z-50 py-6 px-10 flex justify-between items-center text-white">
        <div class="text-2xl font-light tracking-widest">HARVEST <span class="font-bold">RESIDENCES</span></div>
        <div class="space-x-8 text-sm uppercase tracking-wider">
            <a href="#about" class="hover:text-gray-300">项目概述</a>
            <a href="#location" class="hover:text-gray-300">地理位置</a>
            <a href="#contact" class="bg-white text-black px-6 py-2 rounded-full font-bold">立即咨询</a>
        </div>
    </nav>

    <header class="relative h-screen">
        <img src="https://images.unsplash.com/photo-1545324418-cc1a3fa10c00?auto=format&fit=crop&q=80&w=1920" class="absolute inset-0 w-full h-full object-cover" alt="项目效果图">
        <div class="absolute inset-0 bg-black/40"></div>
        <div class="relative z-10 flex flex-col items-center justify-center h-full text-center text-white px-4">
            <h1 class="text-5xl md:text-7xl font-bold mb-4 tracking-tight">重塑都市居住标准</h1>
            <p class="text-xl md:text-2xl font-light mb-10 max-w-2xl">位于慕尼黑黄金地段的高品质公寓，将现代建筑美学与绿色能源完美融合。</p>
            <a href="#about" class="animate-bounce border-2 border-white rounded-full p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </a>
        </div>
    </header>

    <section id="about" class="py-24 bg-white">
        <div class="max-w-7xl mx-auto px-6 grid md:grid-cols-4 gap-8 text-center">
            <div>
                <p class="text-4xl font-bold text-gray-900 mb-2">2027</p>
                <p class="text-gray-500 uppercase tracking-widest text-sm">交房年份</p>
            </div>
            <div>
                <p class="text-4xl font-bold text-gray-900 mb-2">A+</p>
                <p class="text-gray-500 uppercase tracking-widest text-sm">能源等级</p>
            </div>
            <div>
                <p class="text-4xl font-bold text-gray-900 mb-2">12</p>
                <p class="text-gray-500 uppercase tracking-widest text-sm">剩余席位</p>
            </div>
            <div>
                <p class="text-4xl font-bold text-gray-900 mb-2">45m²-135m²</p>
                <p class="text-gray-500 uppercase tracking-widest text-sm">户型面积</p>
            </div>
        </div>
    </section>

    <section class="py-16 bg-gray-100 overflow-hidden">
        <div class="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center gap-16">
            <div class="w-full md:w-1/2">
                <img src="https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80&w=1000" class="rounded-2xl shadow-2xl" alt="内饰">
            </div>
            <div class="w-full md:w-1/2">
                <h2 class="text-3xl font-bold mb-6">不仅是公寓，更是生活艺术</h2>
                <ul class="space-y-4">
                    <li class="flex items-start">
                        <span class="text-green-600 mr-3">✔</span>
                        <span>全屋地暖与橡木实木地板。</span>
                    </li>
                    <li class="flex items-start">
                        <span class="text-green-600 mr-3">✔</span>
                        <span>通透的全景落地窗，最大化采光效果。</span>
                    </li>
                    <li class="flex items-start">
                        <span class="text-green-600 mr-3">✔</span>
                        <span>配备地下智能车位及电动车充电桩。</span>
                    </li>
                </ul>
            </div>
        </div>
    </section>

    <section id="contact" class="py-24 bg-zinc-900 text-white text-center px-6">
        <h2 class="text-4xl font-bold mb-8">索取详细资料包</h2>
        <p class="mb-12 text-zinc-400">我们将为您发送项目手册、详细户型图及最新报价单。</p>
        <div class="max-w-lg mx-auto flex gap-4">
            <input type="email" placeholder="您的电子邮箱" class="flex-1 px-6 py-4 rounded-full bg-white/10 border border-white/20 focus:outline-none focus:ring-2 focus:ring-white">
            <button class="bg-white text-black px-10 py-4 rounded-full font-bold hover:bg-gray-200">发送</button>
        </div>
    </section>

</body>
</html>
